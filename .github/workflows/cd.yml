name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Clone repository if it doesn't exist, otherwise navigate to it
          if [ ! -d "~/2212161-devops-project" ]; then
            git clone https://github.com/sheroonkumar/2212161-devops-project.git ~/2212161-devops-project
          fi
          cd ~/2212161-devops-project

          # 2. Reset local tracking and pull newest main branch updates
          git reset --hard origin/main
          git pull origin main

          # 3. Inject application variables safely into the deployment file
          echo "DATABASE_URL=postgresql://postgres:postgrespassword@postgres_db:5432/devops_db" > .env

          # 4. Tear down active containers and spin up clean production layers
          docker compose down
          docker compose up -d --build
